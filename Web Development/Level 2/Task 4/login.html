<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username or Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="loginBtn">
        Login
    </button>

    <p id="message"></p>

    <a href="register.html">
        Create Account
    </a>

</div>

<script src="auth.js"></script>
<script src="login.js"></script>

</body>
</html>
